<script>
  fetch('navbar.html')
    .then(response => {
      if (!response.ok) throw new Error('navbar.html not found');
      return response.text();
    })
    .then(data => {
      document.getElementById('navbar-placeholder').innerHTML = data;
    })
    .catch(error => {
      console.error('Navbar load error:', error);
      document.getElementById('navbar-placeholder').innerHTML = '<div class="navbar" style="color:red;">⚠️ NAVBAR NOT FOUND</div>';
    });
; });</script>
