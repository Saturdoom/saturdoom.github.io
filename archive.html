<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SaturDoom · Archive</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Additional styles for archive cards */
    .archive-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #0a1c05;
      border: 1px solid #3a7a2f;
      border-radius: 8px;
      padding: 0.8rem 1.5rem;
      margin-bottom: 0.8rem;
      transition: background 0.2s, border-color 0.2s;
      cursor: pointer;
    }
    .archive-card:hover {
      background: #0f2a0a;
      border-color: #6bc84b;
    }
    .archive-card .week-date {
      font-weight: bold;
      color: #b3ff99;
      font-size: 1rem;
    }
    .archive-card .scan-date {
      font-weight: bold;
      color: #b3ff99;
      font-size: 1rem;
    }
    .archive-card .arrow {
      color: #94d47a;
      font-size: 1.2rem;
    }
    .archive-card a {
      text-decoration: none;
      display: block;
      width: 100%;
    }
    /* Override to make the whole card clickable via JS, but we'll wrap with <a> */
  </style>
</head>
<body>
  <div class="panel">
    <div id="navbar-placeholder"></div>
    <div class="header">
      <div class="logo">
        <h1>SATURDOOM</h1>
        <p>// weekly archive //</p>
      </div>
    </div>

    <div class="defcon-panel" style="min-height: auto;">
      <div class="carousel-week-content" style="text-align: left;">
        <h2 class="week-header" style="margin: 1.5rem;">📅 AVAILABLE WEEKS</h2>
        <div id="archiveGrid">
          <!-- cards will be inserted here -->
        </div>
      </div>
    </div>

    <div class="footer" style="margin: 1.5rem 0 1.5rem 0">† SATURDOOM · weekly archive †</div>
  </div>

  <script>
    fetch('navbar.html')
      .then(response => response.text())
      .then(data => document.getElementById('navbar-placeholder').innerHTML = data)
      .catch(() => document.getElementById('navbar-placeholder').innerHTML = '<div class="navbar" style="color:white;">⚠️ NAVBAR NOT FOUND - VISIT saturdoom.github.io</div>');

    // Data must match the same weeks used in script.js
    const weeksData = [
      { date: "2026-04-13", scan: "04-18", energy: 7.73, tech: -3.85 },
      // Add more weeks here as they become available
    ];

    const grid = document.getElementById('archiveGrid');
    weeksData.forEach(week => {
      const card = document.createElement('div');
      card.className = 'archive-card';
      // Make whole card clickable via JavaScript
      card.addEventListener('click', () => {
        window.location.href = `index.html?week=${week.date}`;
      });
      card.innerHTML = `
        <div class="week-date">🪖 WEEK ${week.date}</div>
        <div class="scan-date">SCAN: ${week.scan}</div>
        <div class="arrow">→</div>
      `;
      grid.appendChild(card);
    });
  </script>
</body>
</html>
